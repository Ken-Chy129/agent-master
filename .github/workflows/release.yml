name: release

# Push a tag like v0.1.0 to build cross-platform binaries and publish a Release.
# Uses the built-in GITHUB_TOKEN — no personal token needed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build embedded Web client and release binaries
        run: make release VERSION="${GITHUB_REF_NAME#v}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/agent-master-*

  # Build the macOS desktop app (.dmg + .zip) and attach it to the same release.
  # Runs on macOS because electron-builder can only produce mac artifacts there.
  # Unsigned/ad-hoc: users clear quarantine once with `xattr -cr` (see README).
  desktop-mac:
    runs-on: macos-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build desktop app (web + electron main/preload)
        working-directory: frontend
        run: npm run build -w @agent-master/desktop

      - name: Package .dmg + .zip (arm64 + x64)
        working-directory: frontend/apps/desktop
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: electron-builder
        run: |
          set -o pipefail
          npx electron-builder --mac dmg zip --arm64 --x64 \
            -c.extraMetadata.version="${GITHUB_REF_NAME#v}" 2>&1 | tee eb-build.log

      - name: Upload build log if packaging failed
        if: failure()
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: frontend/apps/desktop/eb-build.log

      - name: Attach desktop artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            frontend/apps/desktop/release/*.dmg
            frontend/apps/desktop/release/*.zip

  # Build the Windows desktop installer (NSIS .exe) and attach it to the same
  # release. Unsigned: SmartScreen warns once on first launch.
  desktop-win:
    runs-on: windows-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build desktop app (web + electron main/preload)
        working-directory: frontend
        run: npm run build -w @agent-master/desktop

      - name: Package NSIS installer (x64)
        working-directory: frontend/apps/desktop
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: electron-builder
        run: |
          set -o pipefail
          npx electron-builder --win nsis --x64 \
            -c.extraMetadata.version="${GITHUB_REF_NAME#v}" 2>&1 | tee eb-build.log

      - name: Upload build log if packaging failed
        if: failure()
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: frontend/apps/desktop/eb-build.log

      - name: Attach desktop artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: frontend/apps/desktop/release/*.exe

  # Package the native-binary downloader as an npm CLI. The tarball is always
  # attached to the GitHub Release; publishing to npm is enabled when the
  # repository has an NPM_TOKEN secret.
  npm-package:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Test npm installer
        working-directory: npm/agent-master
        run: npm test

      - name: Set package version from tag
        working-directory: npm/agent-master
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      - name: Build npm tarball
        working-directory: npm/agent-master
        run: mkdir -p release && npm pack --pack-destination release

      - name: Attach npm tarball to release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: npm/agent-master/release/*.tgz

      - name: Check npm publishing credentials
        id: npm-auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish npm package
        if: steps.npm-auth.outputs.available == 'true'
        working-directory: npm/agent-master
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
