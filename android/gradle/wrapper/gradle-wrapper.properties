distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# CN mirror for the Gradle distribution so `./gradlew` bootstraps behind the GFW.
# Swap to https://services.gradle.org/distributions/gradle-8.10.2-bin.zip if the
# mirror is stale.
distributionUrl=https\://mirrors.cloud.tencent.com/gradle/gradle-8.10.2-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
